services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lgs
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: ["qdrant_data:/qdrant/storage"]

  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes: ["ollama_data:/root/.ollama"]

  # Builds (and tags) the locked-down per-submission runner image used by the
  # sandbox service. Not started by `up` — run `docker compose build sandbox_runner` once.
  sandbox_runner:
    build:
      context: .
      dockerfile: services/sandbox/Dockerfile.runner
    image: lgs-sandbox-runner:latest
    command: ["true"]
    profiles: ["build-only"]

  llm_router:
    build:
      context: .
      dockerfile: services/llm_router/Dockerfile
    ports: ["8001:8001"]
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on: [ollama]

  sandbox:
    build:
      context: .
      dockerfile: services/sandbox/Dockerfile
    ports: ["8004:8004"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  retrieval:
    build:
      context: .
      dockerfile: services/retrieval/Dockerfile
    ports: ["8003:8003"]
    environment:
      QDRANT_URL: http://qdrant:6333
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on: [qdrant, ollama]

  doc_ingestion_worker:
    build:
      context: .
      dockerfile: services/doc_ingestion_worker/Dockerfile
    environment:
      LLM_ROUTER_URL: http://llm_router:8001
      RETRIEVAL_URL: http://retrieval:8003
    profiles: ["tools"]
    depends_on: [llm_router, retrieval]

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    ports: ["8002:8002"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lgs
      REDIS_URL: redis://redis:6379/0
      LLM_ROUTER_URL: http://llm_router:8001
      RETRIEVAL_URL: http://retrieval:8003
      SANDBOX_URL: http://sandbox:8004
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      llm_router:
        condition: service_started

  api_gateway:
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile
    ports: ["8000:8000"]
    environment:
      ORCHESTRATOR_URL: http://orchestrator:8002
    depends_on: [orchestrator]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on: [api_gateway]

volumes:
  pgdata:
  qdrant_data:
  ollama_data:
